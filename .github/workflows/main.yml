name: macOS Remote Desktop
on: workflow_dispatch

jobs:
  macos:
    name: "Run on the fastest infrastructure"
    runs-on: ghcr.io/cirruslabs/macos-runner:tahoe-xl
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode 16.2
        run: |
          xcodes installed
          sudo xcodes select 16.2

      - name: Setup VNC and Web Access
        run: |
          # 1. فعال‌سازی Screen Sharing در مک
          sudo /usr/libexec/PlistBuddy -c "Set :com.apple.screensharing.agent:set-resolutions:0:width 1280" /Library/Preferences/com.apple.RemoteManagement.plist
          sudo /usr/libexec/PlistBuddy -c "Set :com.apple.screensharing.agent:set-resolutions:0:height 800" /Library/Preferences/com.apple.RemoteManagement.plist
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          # تنظیم رمز عبور برای VNC (رمز: 123456)
          sudo /usr/libexec/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -allowAccessFor -allUsers -privs -all
          sudo /usr/libexec/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncprinting -vncprinting yes
          sudo /usr/libexec/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncpw -vncpw 123456
          sudo /usr/libexec/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent

      - name: Install noVNC and Cloudflare
        run: |
          brew install novnc cloudflare/cloudflare/cloudflared
          
      - name: Start noVNC and Cloudflare Tunnel
        run: |
          # اجرای noVNC به صورت Background (پل بین VNC و WebSocket)
          # پورت پیش‌فرض VNC مک 5900 است که روی پورت 6080 وب می‌آید
          websockify --web /usr/local/share/novnc --detach 6080 localhost:5900
          
          # ایجاد تونل کلودفلر برای پورت 6080
          echo "Connecting to Cloudflare..."
          cloudflared tunnel --url http://localhost:6080 &
          
          # صبر برای ایجاد لینک
          sleep 10
          
      - name: Keep Alive
        run: |
          echo "Access your macOS via the Cloudflare URL above."
          echo "VNC Password is: 123456"
          # این دستور باعث می‌شود Runner بسته نشود (تا 6 ساعت)
          sleep 21600 
          

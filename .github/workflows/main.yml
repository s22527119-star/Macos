name: macOS Remote Access (Low-priority)
on: workflow_dispatch

jobs:
  tests:
    name: "PR Validation"
    # ترکیب Tahoe-XL و اولویت پایین در یک لیست
    runs-on: ["ghcr.io/cirruslabs/macos-runner:tahoe-xl", "low-priority"]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: |
          xcodes installed
          sudo xcodes select 16.2

      - name: Enable macOS Screen Sharing
        run: |
          # فعال‌سازی سرویس VNC و تنظیم دسترسی کامل
          sudo /usr/libexec/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
          # تنظیم رمز عبور VNC روی 1234
          sudo /usr/libexec/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncprinting -vncprinting yes
          sudo /usr/libexec/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncpw -vncpw 1234

      - name: Install noVNC and Cloudflared
        run: |
          brew install novnc cloudflared

      - name: Start Web Tunnel (noVNC + Cloudflare)
        run: |
          # اجرای پل ارتباطی VNC به وب در پورت 6080
          websockify --web /usr/local/share/novnc/ --detach 6080 localhost:5900
          
          # ایجاد تونل کلودفلر برای دسترسی از راه دور
          echo "--- LOOK FOR CLOUDFLARE URL BELOW ---"
          cloudflared tunnel --url http://localhost:6080 & 
          
          # توقف کوتاه برای اطمینان از بالا آمدن تونل
          sleep 15

      - name: Keep Alive & Log Info
        run: |
          echo "Password for VNC: 1234"
          echo "Check the 'Start Web Tunnel' log for your public URL."
          # نگه داشتن رانر برای استفاده (حداکثر 6 ساعت)
          sleep 21600
          
